# automated-posting 설정
# shadow-meteorite에서 분리

content:
  daily_limit:
    instagram: 2
    x: 5
    youtube: 2
    tiktok: 3
    facebook: 3
    threads: 3
  topics:
    - AI/테크
    - 재테크

schedule:
  instagram:
    - "11:00"
    - "19:00"
  x:
    - "08:00"
    - "12:00"
    - "21:00"
  youtube:
    - "18:00"
  tiktok:
    - "12:00"
    - "20:00"

collector:
  intervals:
    google_trends: 360
    x_trends: 60
    reddit: 180
    finance_news: 120
    hacker_news: 180
    coingecko: 60
    yahoo_finance: 120

analyzer:
  score_weights:
    volume: 0.4
    engagement: 0.3
    freshness: 0.3
  freshness:
    within_24h: 1.0
    within_48h: 0.5
    older: 0.1

retry:
  max_attempts: 3
  backoff_seconds: [1, 2, 4]

platforms:
  thumbnail_sizes:
    youtube: [1280, 720]
    instagram: [1080, 1080]
    tiktok: [1080, 1920]
    x: [1200, 675]
    facebook: [1200, 630]
  video_formats:
    longform:
      width: 1920
      height: 1080
      fps: 30
    shortform:
      width: 1080
      height: 1920
      fps: 30
