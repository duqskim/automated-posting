<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 1080px;
  height: 1350px;
  font-family: 'Pretendard', sans-serif;
  overflow: hidden;
}
.slide {
  width: 1080px;
  height: 1350px;
  background: {{ bg_primary | default('#0F172A') }};
  padding: 80px;
  display: flex;
  flex-direction: column;
  color: {{ text_primary | default('#F1F5F9') }};
  position: relative;
}
.point-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 20px;
  background: {{ accent | default('#3B82F6') }}20;
  border: 1px solid {{ accent | default('#3B82F6') }}40;
  border-radius: 24px;
  font-size: 14px;
  font-weight: 600;
  color: {{ accent | default('#60A5FA') }};
  margin-bottom: 32px;
  width: fit-content;
}
.title {
  font-size: {{ title_size | default(44) }}px;
  font-weight: 700;
  line-height: 1.4;
  word-break: keep-all;
  margin-bottom: 32px;
}
.divider {
  width: 100%;
  height: 1px;
  background: {{ text_secondary | default('#334155') }};
  margin: 20px 0 32px;
}
.body-text {
  font-size: {{ body_size | default(24) }}px;
  font-weight: 400;
  line-height: 1.8;
  color: {{ text_secondary | default('#CBD5E1') }};
  word-break: keep-all;
  flex: 1;
}
.body-text .em {
  color: {{ text_primary | default('#F1F5F9') }};
  font-weight: 600;
}
/* 카드형 강조 박스 */
.highlight-box {
  margin-top: 32px;
  padding: 28px 32px;
  background: rgba(255, 255, 255, 0.04);
  border-left: 4px solid {{ accent | default('#3B82F6') }};
  border-radius: 0 12px 12px 0;
  font-size: 22px;
  line-height: 1.7;
  color: {{ text_primary | default('#E2E8F0') }};
}
.bottom-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 24px;
}
.brand-handle {
  font-size: 16px;
  color: {{ text_secondary | default('#475569') }};
}
.slide-indicator {
  font-size: 14px;
  color: {{ text_secondary | default('#475569') }};
}
</style>
</head>
<body>
<div class="slide">
  {% if point_num %}
  <div class="point-badge">POINT {{ point_num }}</div>
  {% endif %}
  <div class="title">{{ title | default('제목') }}</div>
  <div class="divider"></div>
  <div class="body-text">{{ body | default('본문 텍스트') }}</div>
  {% if highlight %}
  <div class="highlight-box">{{ highlight }}</div>
  {% endif %}
  <div class="bottom-bar">
    <span class="brand-handle">{{ brand_handle | default('') }}</span>
    <span class="slide-indicator">{{ slide_num | default('') }} / {{ total_slides | default('') }}</span>
  </div>
</div>
</body>
</html>
