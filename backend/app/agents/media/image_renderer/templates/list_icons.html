<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 1080px;
  height: 1350px;
  font-family: 'Pretendard', sans-serif;
  overflow: hidden;
}
.slide {
  width: 1080px;
  height: 1350px;
  background: {{ bg_primary | default('#0F172A') }};
  padding: 80px;
  display: flex;
  flex-direction: column;
  color: {{ text_primary | default('#F1F5F9') }};
  position: relative;
}
.slide-title {
  font-size: 40px;
  font-weight: 700;
  margin-bottom: 48px;
  word-break: keep-all;
  line-height: 1.3;
}
.list-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.list-item {
  display: flex;
  align-items: flex-start;
  gap: 24px;
  padding: 28px 32px;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.06);
}
.list-num {
  width: 48px;
  height: 48px;
  background: {{ accent | default('#3B82F6') }}20;
  border: 1px solid {{ accent | default('#3B82F6') }}40;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  color: {{ accent | default('#60A5FA') }};
  flex-shrink: 0;
}
.list-content {
  flex: 1;
}
.list-title {
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 6px;
  word-break: keep-all;
}
.list-desc {
  font-size: 18px;
  color: {{ text_secondary | default('#94A3B8') }};
  line-height: 1.5;
  word-break: keep-all;
}
.bottom-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 24px;
}
.brand-handle { font-size: 16px; color: {{ text_secondary | default('#475569') }}; }
.slide-indicator { font-size: 14px; color: {{ text_secondary | default('#475569') }}; }
</style>
</head>
<body>
<div class="slide">
  <div class="slide-title">{{ title | default('리스트 제목') }}</div>
  <div class="list-container">
    {% for item in items %}
    <div class="list-item">
      <div class="list-num">{{ loop.index }}</div>
      <div class="list-content">
        <div class="list-title">{{ item.title }}</div>
        {% if item.desc %}
        <div class="list-desc">{{ item.desc }}</div>
        {% endif %}
      </div>
    </div>
    {% endfor %}
  </div>
  <div class="bottom-bar">
    <span class="brand-handle">{{ brand_handle | default('') }}</span>
    <span class="slide-indicator">{{ slide_num | default('') }} / {{ total_slides | default('') }}</span>
  </div>
</div>
</body>
</html>
