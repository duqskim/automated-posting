<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  width: 1080px;
  height: 1350px;
  font-family: 'Pretendard', sans-serif;
  overflow: hidden;
}
/* list_icons는 중간톤 — dark와 light 사이 */
.slide {
  width: 1080px;
  height: 1350px;
  background: {{ bg_primary | default('#0F172A') }};
  padding: 72px 80px;
  display: flex;
  flex-direction: column;
  color: {{ text_primary | default('#F1F5F9') }};
  position: relative;
}
/* 배경 장식 */
.bg-accent {
  position: absolute;
  top: 0;
  right: 0;
  width: 400px;
  height: 400px;
  background: radial-gradient(circle at top right, {{ accent | default('#3B82F6') }}12, transparent 60%);
  pointer-events: none;
}
/* 헤더 */
.slide-header {
  margin-bottom: 44px;
  position: relative;
  z-index: 1;
}
.slide-title {
  font-size: 40px;
  font-weight: 800;
  line-height: 1.3;
  word-break: keep-all;
  letter-spacing: -0.5px;
}
.title-underline {
  width: 56px;
  height: 4px;
  background: {{ accent | default('#3B82F6') }};
  border-radius: 2px;
  margin-top: 16px;
}
/* 리스트 컨테이너 */
.list-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 16px;
  position: relative;
  z-index: 1;
}
/* 리스트 아이템 카드 */
.list-item {
  display: flex;
  align-items: flex-start;
  gap: 20px;
  padding: 26px 28px;
  background: rgba(255, 255, 255, 0.04);
  border-radius: 16px;
  border: 1px solid rgba(255, 255, 255, 0.07);
  transition: none;
  position: relative;
  overflow: hidden;
  flex: 1;
  min-height: 100px;
}
.list-item::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, {{ accent | default('#3B82F6') }}, {{ accent_secondary | default('#8B5CF6') }});
  opacity: 0.7;
}
/* 넘버 뱃지 */
.list-num {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, {{ accent | default('#3B82F6') }}, {{ accent_secondary | default('#8B5CF6') }});
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 800;
  color: #FFFFFF;
  flex-shrink: 0;
  box-shadow: 0 4px 12px {{ accent | default('#3B82F6') }}35;
}
/* 콘텐츠 */
.list-content {
  flex: 1;
  min-width: 0;
}
.list-title {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
  word-break: keep-all;
  color: {{ text_primary | default('#F1F5F9') }};
}
.list-desc {
  font-size: 17px;
  color: {{ text_secondary | default('#94A3B8') }};
  line-height: 1.55;
  word-break: keep-all;
}
/* 하단 */
.bottom-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 20px;
  position: relative;
  z-index: 1;
}
.brand-handle { font-size: 15px; color: {{ text_secondary | default('#475569') }}; font-weight: 500; }
.slide-indicator { font-size: 14px; color: {{ text_secondary | default('#475569') }}; }
</style>
</head>
<body>
<div class="slide">
  <div class="bg-accent"></div>
  <div class="slide-header">
    <div class="slide-title">{{ title | default('리스트 제목') }}</div>
    <div class="title-underline"></div>
  </div>
  <div class="list-container">
    {% for item in items %}
    <div class="list-item">
      <div class="list-num">{{ loop.index }}</div>
      <div class="list-content">
        <div class="list-title">{{ item.title }}</div>
        {% if item.desc %}
        <div class="list-desc">{{ item.desc }}</div>
        {% endif %}
      </div>
    </div>
    {% endfor %}
  </div>
  <div class="bottom-bar">
    <span class="brand-handle">{{ brand_handle | default('') }}</span>
    <span class="slide-indicator">{{ slide_num | default('') }} / {{ total_slides | default('') }}</span>
  </div>
</div>
</body>
</html>
